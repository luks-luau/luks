name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cli_binary: lukscli
            runtime_lib: libluksruntime.so
            cli_asset: lukscli-linux-x86_64
            runtime_asset: luksruntime-linux-x86_64.so
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cli_binary: lukscli.exe
            runtime_lib: luksruntime.dll
            cli_asset: lukscli-windows-x86_64.exe
            runtime_asset: luksruntime-windows-x86_64.dll
          - os: macos-latest
            target: x86_64-apple-darwin
            cli_binary: lukscli
            runtime_lib: libluksruntime.dylib
            cli_asset: lukscli-macos-x86_64
            runtime_asset: luksruntime-macos-x86_64.dylib

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: ${{ matrix.target }}

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-registry-${{ hashFiles('Cargo.toml') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-index-${{ hashFiles('Cargo.toml') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-target-${{ hashFiles('Cargo.toml') }}

    - name: Build for target
      run: cargo build --release --target ${{ matrix.target }}

    - name: Strip binaries (Linux)
      if: runner.os == 'Linux'
      run: |
        strip target/${{ matrix.target }}/release/${{ matrix.cli_binary }}
        strip target/${{ matrix.target }}/release/${{ matrix.runtime_lib }}

    - name: Strip binaries (macOS)
      if: runner.os == 'macOS'
      run: |
        strip target/${{ matrix.target }}/release/${{ matrix.cli_binary }}
        strip -x target/${{ matrix.target }}/release/${{ matrix.runtime_lib }} || true

    - name: Upload CLI artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.cli_asset }}
        path: target/${{ matrix.target }}/release/${{ matrix.cli_binary }}

    - name: Upload Runtime artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.runtime_asset }}
        path: target/${{ matrix.target }}/release/${{ matrix.runtime_lib }}

    - name: Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          target/${{ matrix.target }}/release/${{ matrix.cli_binary }}
          target/${{ matrix.target }}/release/${{ matrix.runtime_lib }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
